<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices | College ERP</title>

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f6f8;
        }

        header{
            background:#111;
            color:#fff;
            padding:25px 8%;
        }

        .container{
            width:90%;
            margin:30px auto;
        }

        .back-btn{
            display:inline-block;
            background:#079bb3;
            color:#fff;
            text-decoration:none;
            padding:12px 20px;
            border-radius:6px;
            margin-bottom:25px;
        }

        .section{
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

        h2{
            color:#079bb3;
            border-bottom:2px solid #eee;
            padding-bottom:10px;
        }

        .notice{
            background:#f7f9fa;
            border-left:5px solid #079bb3;
            padding:15px;
            margin-bottom:15px;
            border-radius:5px;
        }

        .notice h3{
            margin:0 0 8px;
        }

        .empty{
            text-align:center;
            color:#777;
            padding:25px;
        }
    </style>
</head>

<body>

<header>
    <h1>College ERP</h1>
    <p>Student Notices</p>
</header>

<div class="container">

    <a href="{% url 'student_dashboard' %}" class="back-btn">
        ← Back to Dashboard
    </a>

    <div class="section">

        <h2>Notices</h2>

        {% if notices %}

            {% for notice in notices %}

            <div class="notice">
                <h3>{{ notice.title }}</h3>
                <p>{{ notice.description }}</p>
                <small>{{ notice.date }}</small>
            </div>

            {% endfor %}

        {% else %}

            <p class="empty">
                No notices found.
            </p>

        {% endif %}

    </div>

</div>

</body>
</html>
