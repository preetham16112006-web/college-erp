<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .header {
            background: #17191c;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        form p {
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        button, .back-btn {
            display: inline-block;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
        }

        button {
            background: #168bc0;
            color: white;
        }

        .back-btn {
            background: #555;
            color: white;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Add Student</h1>
</div>

<div class="container">
    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Save Student</button>
        <a href="{% url 'student_list' %}" class="back-btn">Back</a>
    </form>
</div>

</body>
</html>
